<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무비체크 - 가장 싼 영화 찾기</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="./src/css/xx.css">
</head>

<body>
  <header>
    <h1 class="logo"><a href="#"><img src="./src/assets/logo.svg" alt=LOGO""></a></h1>
  </header>

  <main>
    <section class="hero-section">
      <h1>지금, 가장 <span>싸게</span> 볼 수 있는 영화 찾기</h1>
      <p>CGV, 롯데시네마, 메가박스 - 한 번에 비교하고 최저가로 예매하세요</p>
    </section>

    <section class="search-card">
      <div class="form-group">
        <label class="form-label">지역</label>
        <div class="input-row">
          <div class="input-box">
            <span>강남구, 서울</span>
            <svg viewBox="0 0 24 24">
              <path d="M7 10l5 5 5-5z" />
            </svg>
          </div>
          <button class="btn-location" title="내 위치">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">날짜</label>
        <div class="input-box">
          <span>2026. 04. 16 (목)</span>
          <svg viewBox="0 0 24 24">
            <path
              d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z" />
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">시간대</label>
        <div class="time-chips">
          <div class="chip active">조조 (06:00~10:59)</div>
          <div class="chip">브런치 (11:00~16:59)</div>
          <div class="chip">야간 (17:00~02:00)</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">인원</label>
        <div class="personnel-container">
          <div class="personnel-row">
            <div class="personnel-info">
              <span>성인</span>
            </div>
            <div class="counter">
              <button class="btn-counter" onclick="updateCount('adult', -1)">-</button>
              <span class="count-value" id="adult-count">1</span>
              <button class="btn-counter" onclick="updateCount('adult', 1)">+</button>
            </div>
          </div>
          <div class="personnel-row">
            <div class="personnel-info">
              <span>청소년</span>
            </div>
            <div class="counter">
              <button class="btn-counter" onclick="updateCount('youth', -1)">-</button>
              <span class="count-value" id="youth-count">0</span>
              <button class="btn-counter" onclick="updateCount('youth', 1)">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn-primary"><i class="fas fa-wand-magic-sparkles"></i> AI 추천받기</button>
        <button class="btn-secondary">직접 비교하기</button>
      </div>
    </section>


    <div class="footer-stats">
      <span>현재 <b class="blue" id="movieCount">1,234</b>개 영화 상영 중</span>
      <span>최저가 절감액 <b class="blue" id="savingsAmount">₩2,456,789</b></span>
    </div>
  </main>

  <script>
    function updateCount(type, delta) {
      const countElement = document.getElementById(type + '-count');
      let currentCount = parseInt(countElement.innerText);
      let newCount = currentCount + delta;

      if (newCount >= 0) {
        countElement.innerText = newCount;
      }
    }

    // 시간대 칩 선택 기능
    const chips = document.querySelectorAll('.chip');
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });
  </script>
</body>

</html>

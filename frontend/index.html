<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다보여 | DABOYEO</title>
  <!-- favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="45x45" href="favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>
  <!-- main -->
  <div class="main-content">
    <h1 class="logo-top"><a href="/"><img src="./src/assets/logo.svg" alt="LOGO"></a></h1>

    <h1>지금, 가장 <span>싸게</span> 볼 수 있는 영화 찾기</h1>
    <p class="subtitle">CGV, 롯데시네마, 메가박스 — 한 번에 비교하고 최저가로 예매하세요</p>

    <!-- Search Card -->
    <div class="search-card">
      <div class="form-row">
        <div class="form-group">
          <label>지역</label>
          <div class="aa">
            <div class="input-wrapper">
              <i class="fas fa-map-marker-alt"></i>
              <input type="text" id="regionInput" placeholder="지역 검색(전체)">
            </div>
            <button class="btn-map" id=""><i class="fas fa-location-dot"></i> 내 위치</button>
          </div>
        </div>
      </div>

      <div class="form-row">
        <!-- ============================================
             3. 날짜 입력 기능 개선
             ============================================ -->
        <div class="form-group">
          <label>날짜</label>

          <div class="input-wrapper">
            <i class="fas fa-calendar"></i>
            <input type="text" id="dateInput" readonly placeholder="날짜 선택">
          </div>

          <!-- 커스텀 달력 -->
          <div class="calendar" id="calendar">
            <div class="calendar-header">
              <button id="prevMonth">&lt;</button>
              <span id="monthYear"></span>
              <button id="nextMonth">&gt;</button>
            </div>

            <div class="calendar-days">
              <div>일</div>
              <div>월</div>
              <div>화</div>
              <div>수</div>
              <div>목</div>
              <div>금</div>
              <div>토</div>
            </div>

            <div class="calendar-dates" id="calendarDates"></div>
          </div>
        </div>

        <!-- ============================================
             4. 시간 선택 슬라이더 (핵심)
             ============================================ -->
        <div class="form-group">
          <label>시간대 선택</label>
          <div class="time-selection-group">
            <div class="time-option">
              <input type="radio" name="timeRange" id="time-morning" value="morning" checked>
              <label for="time-morning">
                <span class="time-name">조조</span>
                <span class="time-range">(06:00~10:00)</span>
              </label>
            </div>
            <div class="time-option">
              <input type="radio" name="timeRange" id="time-brunch" value="brunch">
              <label for="time-brunch">
                <span class="time-name">브런치</span>
                <span class="time-range">(10:00~16:00)</span>
              </label>
            </div>
            <div class="time-option">
              <input type="radio" name="timeRange" id="time-night" value="night">
              <label for="time-night">
                <span class="time-name">야간</span>
                <span class="time-range">(22:00~02:00)</span>
              </label>
            </div>
          </div>
        </div>

        <!-- ============================================
             5. 인원 선택 기능
             ============================================ -->
        <div class="form-group">
          <label>인원</label>
          <div class="person-counter">
            <button class="counter-btn" id="decreaseBtn">−</button>
            <div class="counter-value" id="personCount">1</div>
            <button class="counter-btn" id="increaseBtn">+</button>
            <span>명</span>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-search" id="searchBtn"><i class="fas fa-wand-magic-sparkles"></i> AI 추천받기</button>
        <button class="btn-nearby" id="nearbyBtn">직접 비교하기</button>
      </div>
    </div>

    <div class="footer-stats">
      <span>현재 <b class="blue" id="movieCount">1,234</b>개 영화 상영 중</span>
      <span>최저가 절감액 <b class="blue" id="savingsAmount">₩2,456,789</b></span>
    </div>
  </div>

  <!-- Kakao SDK -->
  <script
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=0520b1a822c33d45a0a7075152d340fa&libraries=services"></script>

  <script src="./src/js/include.js"></script>
  <script src="./src/js/pages/common.js"></script>
  <script src="./src/js/pages/script.js"></script>
  <script src="./src/js/api/kakaoMap.js"></script>
</body>

</html>

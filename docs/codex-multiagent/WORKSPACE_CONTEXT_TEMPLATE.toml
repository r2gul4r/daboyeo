# Copy this file to a workspace root as WORKSPACE_CONTEXT.toml.
# Keep arrays on a single line.

[workspace]
name = "example-workspace"
summary = "Repository-specific context used to generate a workspace override AGENTS.md and initial STATE.md."
task_board_path = "STATE.md"
multi_agent_log_path = "MULTI_AGENT_LOG.md"
error_log_path = "ERROR_LOG.md"

[persona_override]
# Optional local persona overrides.
# Global defaults: persona_name = "gogi"; response_language = "Korean unless the user asks otherwise".
# Global defaults: speech_style = "concise Korean banmal"; tone = "dry, confident senior engineer".
# Delete this section for full inherit; omit a key for field-level inherit.
# Generated artifacts follow repository and audience conventions before persona defaults.
name = ""
response_language = ""
speech_style = ""
tone = ""
# Boolean keys cannot be empty. Omit this key to inherit, or set true/false to override.
# allow_mild_profanity = false
code_comment_language = ""

[repository]
facts = ["Package manager: pnpm", "Primary source of truth: src/**"]

[required_context]
read = ["docs/architecture.md", "docs/contributing.md"]

[verification]
commands = ["pnpm lint", "pnpm test", "pnpm build"]

[contracts]
shared = ["Routes remain stable unless explicitly changed", "Shared UI components stay reusable", "Public env keys must be pinned before fan-out"]

[paths]
shared_assets = ["src/components/common/**", "src/shared/**", "src/types/**"]
do_not_touch = ["dist/**", "generated/**", "vendor/**"]

[triggers]
hard = ["Changing shared asset paths", "Changing routes or payload contracts", "UI + API changes in one task"]

[approval]
zones = ["Deploys", "Database migrations", "Writes to external systems"]

[workers]
mapping = ["worker_shared = src/components/common/**, src/shared/**, src/types/**", "worker_feature_ui = src/pages/**, src/features/**", "worker_feature_test = tests/**, docs/**"]

[reviewer]
focus = ["Contract integrity", "Regression risk", "Verification gaps"]

[forbidden]
patterns = ["Mechanical split by org chart only", "Direct edits to generated output", "Skipping required reviewer checks on delegated work"]

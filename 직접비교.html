<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DABOYEO - 영화 정보</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --white0: #fff;
            --white50: #F8F8FA;
            --gray0: #111;
            --gray50: #444;
            --gray100: #999;
            --card-bg: rgba(30, 30, 30, 0.8);
            --purple0: #7264E9;
            --purple50: #9B92FA;
            --purple60: #BDB9E4;
            --pink50: #faa8c4;
            --red50: #FF4444;
            --fixed-header-height: 60px;
            --basic-page-top-gap: 32px;
            scroll-behavior: smooth;
        }

        body {
            font: 16px/1.7 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--gray100);
            background-color: #000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            padding: var(--basic-page-top-gap) 20px;
            margin-top: var(--fixed-header-height);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--purple0);
            letter-spacing: 3px;
            margin-bottom: 15px;
            display: block;
            text-transform: uppercase;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--white0);
            margin-bottom: 10px;
        }

        h1 span { color: var(--purple50); }

        .subtitle { color: var(--gray100); font-size: 15px; }

        .filter-section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 16px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-group { flex: 1; }
        .filter-group label {
            display: block;
            font-size: 13px;
            color: var(--purple60);
            margin-bottom: 10px;
            font-weight: 600;
        }
        .filter-group label i { margin-right: 6px; }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: var(--white0);
            border: 1px solid var(--gray50);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            appearance: none;
            outline: none;
        }

        .filter-btn {
            background: var(--purple0);
            color: var(--white0);
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 45px;
            transition: background 0.3s;
        }

        .filter-btn:hover { background: var(--purple50); }

        .result-info { margin-bottom: 25px; font-size: 15px; color: var(--white50); }
        .result-info span { color: var(--purple50); font-weight: 800; }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .movie-card {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            border-color: var(--purple60);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .poster-area {
            aspect-ratio: 2/3;
            background: #111;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .poster-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .badge-age {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            z-index: 2;
        }

        .age-all { background: #2ecc71; color: white; }
        .age-12 { background: #f1c40f; color: black; }
        .age-15 { background: #e67e22; color: white; }
        .age-19 { background: var(--red50); color: white; }

        .tag-status {
            position: absolute;
            bottom: 12px;
            right: 12px;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            z-index: 2;
        }

        .status-playing { background: #2ecc71; color: white; }
        .status-expected { background: #f1c40f; color: black; }

        .movie-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .movie-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--white0);
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .theater-tags { display: flex; gap: 6px; margin-bottom: 15px; }
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        .tag-cgv { background: var(--red50); color: white; }
        .tag-lotte { background: #f1c40f; color: black; }
        .tag-mega { background: var(--purple0); color: white; }

        .seat-info { font-size: 13px; color: var(--gray100); margin-bottom: 20px; }
        .seat-info i { margin-right: 6px; color: var(--purple60); }
        .seat-info span { color: var(--purple50); font-weight: 700; }

        .card-btn {
            width: 100%;
            background: transparent;
            border: 1.5px solid var(--purple0);
            color: var(--purple50);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            margin-top: auto;
        }

        .card-btn:hover { background: var(--purple0); color: var(--white0); }

        .load-more-container { display: flex; justify-content: center; margin: 50px 0; }
        .load-more-btn {
            background: transparent;
            color: var(--white0);
            border: 1px solid var(--gray50);
            padding: 15px 60px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .load-more-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--white0); }

        footer { width: 100%; background: var(--white0); color: var(--gray50); padding: 60px 0; margin-top: auto; }
        .footer-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .footer-links { display: flex; flex-wrap: wrap; gap: 25px; font-size: 13px; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 25px; font-weight: 600; }
        .footer-bottom { display: flex; justify-content: space-between; align-items: flex-start; }
        .footer-info { font-size: 13px; line-height: 2; }
        .footer-logo { font-size: 22px; font-weight: 900; color: var(--gray0); margin-bottom: 15px; display: block; }
        .footer-search { width: 350px; }
        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input { width: 100%; padding: 12px 20px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .search-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--gray100); }
        .social-links { display: flex; gap: 20px; justify-content: flex-end; }
        .social-links i { font-size: 24px; color: var(--gray100); cursor: pointer; transition: color 0.3s; }
        .social-links i:hover { color: var(--gray0); }

        @media (max-width: 1200px) { .movie-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); }
            .filter-section { flex-direction: column; align-items: stretch; }
            .footer-bottom { flex-direction: column; gap: 40px; }
            .footer-search { width: 100%; }
        }
        @media (max-width: 500px) { .movie-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="logo">DABOYEO</span>
        <h1>지금 바로 볼 수 있는 <span>통합</span> 영화 정보</h1>
        <p class="subtitle">3대 영화사의 실시간 상영 정보를 한 장의 카드로 완벽하게 통합했습니다.</p>
    </header>

    <div class="filter-section">
        <div class="filter-group">
            <label><i class="fas fa-building"></i> 영화사</label>
            <select><option>전체 영화사</option></select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-clock"></i> 상영회 타입</label>
            <select><option>전체 타입</option></select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-chair"></i> 좌석 현황</label>
            <select><option>전체 상영</option></select>
        </div>
        <button class="filter-btn"><i class="fas fa-filter"></i> 필터 적용</button>
    </div>

    <div class="result-info">검색 결과 <span id="total-count">0</span>건</div>
    <div class="movie-grid" id="movie-grid"></div>

    <div class="load-more-container">
        <button class="load-more-btn" id="load-more">더보기 <i class="fas fa-chevron-down"></i></button>
    </div>
</div>

<footer>
    <div class="footer-content">
        <div class="footer-links">
            <span>회사소개</span><span>인재채용</span><span>사회공헌</span><span>제휴/광고/부대사업문의</span><span>이용약관</span><span>위치기반서비스 이용약관</span><span>개인정보처리방침</span><span>윤리경영</span>
        </div>
        <div class="footer-bottom">
            <div class="footer-info">
                <span class="footer-logo">DABOYEO</span>
                경기도 성남시 분당구 판교로 123 (시흥동, 7층) EMAIL: ADMIN@DABOYEO.CO.KR<br>
                사업자등록번호: 100-81-12345 통신판매업신고번호: 제 2024-성남분당-1000호<br>
                © 2024 DABOYEO. ALL RIGHTS RESERVED.
            </div>
            <div class="footer-search">
                <div class="search-box"><input type="text" placeholder="현재 상영작 찾기"><i class="fas fa-search"></i></div>
                <div class="social-links"><i class="fab fa-youtube"></i><i class="fab fa-instagram"></i><i class="fab fa-facebook"></i><i class="fab fa-twitter"></i></div>
            </div>
        </div>
    </div>
</footer>

<script>
    const movieData = [
        { title: "쿵푸팬더 4", age: "all", tags: ["cgv"], seats: 180, halls: 10, status: "" },
        { title: "인사이드 아웃 2", age: "all", tags: ["lotte", "cgv", "mega"], seats: 156, halls: 14, status: "expected" },
        { title: "범죄도시4", age: "15", tags: ["cgv", "lotte"], seats: 120, halls: 20, status: "playing" },
        { title: "설계자", age: "15", tags: ["lotte", "mega"], seats: 120, halls: 12, status: "playing" },
        { title: "원더랜드", age: "12", tags: ["lotte", "cgv"], seats: 110, halls: 10, status: "expected" },
        { title: "퓨리오사: 매드맥스 사가", age: "15", tags: ["mega", "cgv"], seats: 88, halls: 12, status: "playing" },
        { title: "하이재킹", age: "12", tags: ["cgv", "mega"], seats: 30, halls: 5, status: "playing" },
        { title: "남은 인생 10년", age: "12", tags: ["cgv"], seats: 25, halls: 3, status: "playing" },
        { title: "존 윅 4", age: "19", tags: ["mega"], seats: 20, halls: 12, status: "" },
        { title: "가여운 것들", age: "19", tags: ["mega"], seats: 15, halls: 2, status: "" },
        { title: "파묘", age: "15", tags: ["mega"], seats: 10, halls: 1, status: "playing" },
        { title: "그녀가 죽었다", age: "15", tags: ["cgv", "lotte"], seats: 4, halls: 1, status: "" },
        { title: "매드맥스: 분노의 도로", age: "15", tags: ["cgv"], seats: 45, halls: 4, status: "" },
        { title: "인셉션", age: "12", tags: ["mega", "lotte"], seats: 60, halls: 6, status: "" },
        { title: "인터스텔라", age: "12", tags: ["cgv", "mega"], seats: 90, halls: 8, status: "" },
        { title: "어벤져스: 엔드게임", age: "12", tags: ["cgv", "lotte", "mega"], seats: 200, halls: 25, status: "" },
        { title: "기생충", age: "15", tags: ["cgv"], seats: 15, halls: 2, status: "" },
        { title: "너의 이름은.", age: "all", tags: ["mega"], seats: 40, halls: 4, status: "" },
        { title: "라라랜드", age: "12", tags: ["lotte"], seats: 35, halls: 3, status: "" },
        { title: "다크 나이트", age: "15", tags: ["cgv", "mega"], seats: 75, halls: 7, status: "" }
    ];

    const grid = document.getElementById('movie-grid');
    const loadMoreBtn = document.getElementById('load-more');
    const totalCountSpan = document.getElementById('total-count');
    let currentCount = 0;

    function createCard(movie, index) {
        const card = document.createElement('div');
        card.className = 'movie-card';
        const ageClass = `age-${movie.age}`;
        const statusHtml = movie.status ? `<span class="tag-status status-${movie.status}">${movie.status === 'playing' ? '상영중' : '조사예정'}</span>` : '';
        const tagsHtml = movie.tags.map(tag => `<span class="tag tag-${tag}">${tag.toUpperCase()}</span>`).join('');
        
        card.innerHTML = `
            <div class="poster-area">
                <div class="badge-age ${ageClass}">${movie.age.toUpperCase()}</div>
                ${statusHtml}
                <img src="https://picsum.photos/seed/${index + Math.random()}/300/450" alt="${movie.title}">
            </div>
            <div class="movie-info">
                <div class="movie-title">${movie.title}</div>
                <div class="theater-tags">${tagsHtml}</div>
                <div class="seat-info"><i class="fas fa-chair"></i> 총 최대 잔여 <span>${movie.seats}</span> 석 (${movie.halls}개 관)</div>
                <button class="card-btn">상영 정보 및 예매 <i class="fas fa-chevron-right"></i></button>
            </div>
        `;
        return card;
    }

    function loadMovies(count) {
        for (let i = 0; i < count; i++) {
            const movie = movieData[i % movieData.length];
            grid.appendChild(createCard(movie, currentCount + i));
        }
        currentCount += count;
        totalCountSpan.innerText = currentCount;
    }

    // 초기 20개 로드
    loadMovies(20);

    // 더보기 클릭 시 20개 추가 로드
    loadMoreBtn.addEventListener('click', () => {
        loadMovies(20);
        window.scrollBy({ top: 500, behavior: 'smooth' });
    });
</script>

</body>
</html>

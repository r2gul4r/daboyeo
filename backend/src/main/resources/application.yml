server:
  port: ${DABOYEO_BACKEND_PORT:8080}

spring:
  application:
    name: daboyeo-backend
  datasource:
    url: ${DABOYEO_DB_URL:jdbc:mysql://localhost:4000/daboyeo?serverTimezone=Asia/Seoul&characterEncoding=utf8&useSSL=false}
    username: ${DABOYEO_DB_USERNAME:root}
    password: ${DABOYEO_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  flyway:
    enabled: ${DABOYEO_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
  sql:
    init:
      mode: never

logging:
  level:
    kr.daboyeo: INFO

daboyeo:
  cors:
    allowed-origins: ${DABOYEO_FRONTEND_ORIGINS:http://localhost:4173,http://127.0.0.1:4173,http://*:4173,http://localhost:5173,http://127.0.0.1:5173,http://*:5173,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080}
  demo:
    live-fallback-enabled: ${DABOYEO_DEMO_LIVE_FALLBACK_ENABLED:true}
  recommendation:
    lm-studio-base-url: ${DABOYEO_LM_STUDIO_BASE_URL:http://127.0.0.1:1234/v1}
    fast-model: ${DABOYEO_RECOMMEND_FAST_MODEL:gemma-4-e2b-it}
    precise-model: ${DABOYEO_RECOMMEND_PRECISE_MODEL:gemma-4-e4b-it}
    gpt-base-url: ${DABOYEO_RECOMMEND_GPT_BASE_URL:http://127.0.0.1:10531/v1}
    gpt-model: ${DABOYEO_RECOMMEND_GPT_MODEL:gpt-5.5}
    gpt-fast-reasoning-effort: ${DABOYEO_RECOMMEND_GPT_FAST_REASONING_EFFORT:low}
    gpt-precise-reasoning-effort: ${DABOYEO_RECOMMEND_GPT_PRECISE_REASONING_EFFORT:high}
    gpt-fast-ai-candidate-limit: ${DABOYEO_RECOMMEND_GPT_FAST_AI_CANDIDATE_LIMIT:8}
    gpt-precise-ai-candidate-limit: ${DABOYEO_RECOMMEND_GPT_PRECISE_AI_CANDIDATE_LIMIT:12}
    gpt-fast-max-tokens: ${DABOYEO_RECOMMEND_GPT_FAST_MAX_TOKENS:720}
    gpt-precise-max-tokens: ${DABOYEO_RECOMMEND_GPT_PRECISE_MAX_TOKENS:1300}
    min-start-buffer-minutes: ${DABOYEO_RECOMMEND_MIN_START_BUFFER_MINUTES:20}
    fast-ai-candidate-limit: ${DABOYEO_RECOMMEND_FAST_AI_CANDIDATE_LIMIT:5}
    precise-ai-candidate-limit: ${DABOYEO_RECOMMEND_PRECISE_AI_CANDIDATE_LIMIT:5}
    fast-max-tokens: ${DABOYEO_RECOMMEND_FAST_MAX_TOKENS:280}
    precise-max-tokens: ${DABOYEO_RECOMMEND_PRECISE_MAX_TOKENS:160}
    response-text-max-length: ${DABOYEO_RECOMMEND_RESPONSE_TEXT_MAX_LENGTH:56}
    frontend-origins: ${DABOYEO_FRONTEND_ORIGINS:http://localhost:4173,http://127.0.0.1:4173,http://*:4173,http://localhost:5173,http://127.0.0.1:5173,http://*:5173}
  sync:
    enabled: ${DABOYEO_SYNC_ENABLED:true}
    timezone: ${DABOYEO_SYNC_TIMEZONE:Asia/Seoul}
    python-executable: ${DABOYEO_SYNC_PYTHON:python}
    process-timeout-seconds: ${DABOYEO_SYNC_TIMEOUT_SECONDS:180}
    showtimes:
      enabled: ${DABOYEO_SHOWTIME_SYNC_ENABLED:true}
      cron: ${DABOYEO_SHOWTIME_SYNC_CRON:0 0 3 * * *}
      startup-enabled: ${DABOYEO_SHOWTIME_STARTUP_ENABLED:false}
      date-offset-days: ${DABOYEO_SHOWTIME_DATE_OFFSETS:0,1,2}
      cleanup-enabled: ${DABOYEO_SHOWTIME_CLEANUP_ENABLED:true}
      retention-days: ${DABOYEO_SHOWTIME_RETENTION_DAYS:3}
      auto-discovery-enabled: ${DABOYEO_SHOWTIME_AUTO_DISCOVERY_ENABLED:true}
      discovery-movie-limit: ${DABOYEO_SHOWTIME_DISCOVERY_MOVIE_LIMIT:20}
      discovery-lotte-cinema-limit: ${DABOYEO_SHOWTIME_DISCOVERY_LOTTE_CINEMA_LIMIT:50}
      discovery-lotte-movie-target-limit: ${DABOYEO_SHOWTIME_DISCOVERY_LOTTE_MOVIE_TARGET_LIMIT:5}
      discovery-lotte-total-target-limit: ${DABOYEO_SHOWTIME_DISCOVERY_LOTTE_TOTAL_TARGET_LIMIT:12}
      discovery-megabox-bundle-limit: ${DABOYEO_SHOWTIME_DISCOVERY_MEGABOX_BUNDLE_LIMIT:20}
      nearby-refresh-enabled: ${DABOYEO_SHOWTIME_NEARBY_REFRESH_ENABLED:true}
      nearby-refresh-max-theaters-per-provider: ${DABOYEO_SHOWTIME_NEARBY_REFRESH_MAX_THEATERS_PER_PROVIDER:6}
      nearby-refresh-today-ttl-minutes: ${DABOYEO_SHOWTIME_NEARBY_REFRESH_TODAY_TTL_MINUTES:60}
      nearby-refresh-next-day-ttl-minutes: ${DABOYEO_SHOWTIME_NEARBY_REFRESH_NEXT_DAY_TTL_MINUTES:360}
      nearby-refresh-future-ttl-minutes: ${DABOYEO_SHOWTIME_NEARBY_REFRESH_FUTURE_TTL_MINUTES:1440}
      persistence-max-retries: ${DABOYEO_SHOWTIME_PERSISTENCE_MAX_RETRIES:2}
      persistence-retry-backoff-millis: ${DABOYEO_SHOWTIME_PERSISTENCE_RETRY_BACKOFF_MILLIS:1000}
      lotte-preferred-cinema-ids: []
      lotte-preferred-cinema-names: []
      megabox-area-codes: []
    seats:
      enabled: ${DABOYEO_SEAT_SYNC_ENABLED:false}
      cron: ${DABOYEO_SEAT_SYNC_CRON:0 0/30 * * * *}
      lookahead-hours: ${DABOYEO_SEAT_SYNC_LOOKAHEAD_HOURS:6}
      limit: ${DABOYEO_SEAT_SYNC_LIMIT:100}
